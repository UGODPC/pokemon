<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="filtrage">
        <div class="filtre-group">
            <label for="type">Type :</label>
            <select id="type-filter">
                <option value="">Tous les types</option>
            </select>
        </div>
        <div class="filtre-group">
            <label for="attaque-rapide">Attaque rapide :</label>
            <select id="attaque-rapide-filter">
                <option value="">Toutes les attaques</option>
            </select>
        </div>
        <div class="filtre-group">
            <label for="nom-filter">Nom :</label>
            <input type="text" id="nom-filter" placeholder="Rechercher un Pokémon...">
        </div>
    </div>

    <div id="pagination-controls">
        <button id="btn-prec">PRÉC</button>
        <span id="page-info">Page <span id="current-page">1</span> / <span id="total-pages">1</span></span>
        <button id="btn-suiv">SUIV</button>
    </div>

    <table id="mainTable">
        <thead>
            <tr>
                <th data-nomColonne="_id_pokemon">ID</th>
                <th data-nomColonne="_nom_pokemon">Nom</th>
                <th data-nomColonne="_types_pokemon">Types</th>
                <th data-nomColonne="_stamina_pokemon">Endurance</th>
                <th data-nomColonne="_base_attaque_pokemon">Attaque</th>
                <th data-nomColonne="_base_defense_pokemon">Défense</th>
                <th class="no-sort">Image</th>
            </tr>
        </thead>
        <tbody id="pokemon-table-body">
        </tbody>
    </table>

    <div id="overlay" style="display:none;">
        <div id="detail-popup">
            <button id="btn-fermer">X</button>
            <div id="detail-contenu"></div>
        </div>
    </div>

    <div id="image-popup" style="display:none;">
        <img id="image-popup-img" src="" alt="">
    </div>

    <script type="module" src="js/script.js"></script>
</body>
</html>
